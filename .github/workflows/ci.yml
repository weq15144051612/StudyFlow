name: CI

on:
  # 触发条件：push 到 main 分支 和 pull_request
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # 定义 CI 任务
  build:
    # 运行在最新版的 Ubuntu 上
    runs-on: ubuntu-latest

    # 设置 Node.js 环境
    strategy:
      matrix:
        node-version: [20]

    steps:
      # 步骤 1: 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 2: 设置 Node.js 环境
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # 使用缓存加速依赖安装
          cache: 'npm'

      # 步骤 3: 安装依赖
      - name: Install dependencies
        run: npm ci

      # 步骤 4: 执行静态检查（lint）
      - name: Run linter
        run: npm run lint

      # 步骤 5: 执行单元测试
      - name: Run tests
        run: npm test

      # 步骤 6: 上传测试报告
      - name: Upload test results
        if: always()  # 无论测试成功或失败都上传报告
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/  # Jest 默认输出目录
          retention-days: 7    # 报告保留 7 天

      # 步骤 7: 上传代码覆盖率报告（可选）
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
